<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Морской Бой - Расстановка</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    @font-face {
      font-family: 'GULAG Pavljenko';
      src: url('../assets/fonts/GULAG-Pavljenko.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }
  </style>
  
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="background-blur"></div>
  
  <div class="container placement-container">
    <div class="logo">
      <img src="/assets/images/logo.png" alt="Мечи" class="swords-icon">
    </div>
    <h1 class="main-title placement-title">НАСТРОЙКА ПОЛЯ БОЯ</h1>
    
    <!-- Игровая зона -->
    <div class="game-area">
      <!-- Поле 10x10 -->
      <div class="battle-grid" id="battle-grid"></div>

      <!-- Панель кораблей -->
      <div class="ships-panel">
        <div class="ship-wrapper">
          <div class="ship-container" data-size="4" data-id="ship-4-1">
            <svg class="ship-icon ship-4" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M0 20 L10 10 L100 10 L110 20 L100 30 L10 30 Z" fill="#85FBFF" stroke="#85FBFF" stroke-width="2"/>
              <rect x="25" y="5" width="15" height="5" fill="#85FBFF"/>
              <rect x="50" y="5" width="15" height="5" fill="#85FBFF"/>
              <rect x="75" y="5" width="15" height="5" fill="#85FBFF"/>
            </svg>
          </div>
        </div>
        
        <div class="ship-wrapper">
          <div class="ship-container" data-size="3" data-id="ship-3-1">
            <svg class="ship-icon ship-3" viewBox="0 0 90 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M0 20 L10 10 L80 10 L90 20 L80 30 L10 30 Z" fill="#85FBFF" stroke="#85FBFF" stroke-width="2"/>
              <rect x="20" y="5" width="12" height="5" fill="#85FBFF"/>
              <rect x="45" y="5" width="12" height="5" fill="#85FBFF"/>
            </svg>
          </div>
        </div>
        
        <div class="ship-wrapper">
          <div class="ship-container" data-size="3" data-id="ship-3-2">
            <svg class="ship-icon ship-3" viewBox="0 0 90 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M0 20 L10 10 L80 10 L90 20 L80 30 L10 30 Z" fill="#85FBFF" stroke="#85FBFF" stroke-width="2"/>
              <rect x="20" y="5" width="12" height="5" fill="#85FBFF"/>
              <rect x="45" y="5" width="12" height="5" fill="#85FBFF"/>
            </svg>
          </div>
        </div>
        
        <div class="ship-wrapper">
          <div class="ship-container" data-size="2" data-id="ship-2-1">
            <svg class="ship-icon ship-2" viewBox="0 0 60 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M0 20 L8 10 L52 10 L60 20 L52 30 L8 30 Z" fill="#85FBFF" stroke="#85FBFF" stroke-width="2"/>
              <rect x="18" y="5" width="10" height="5" fill="#85FBFF"/>
            </svg>
          </div>
        </div>
        
        <div class="ship-wrapper">
          <div class="ship-container" data-size="2" data-id="ship-2-2">
            <svg class="ship-icon ship-2" viewBox="0 0 60 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M0 20 L8 10 L52 10 L60 20 L52 30 L8 30 Z" fill="#85FBFF" stroke="#85FBFF" stroke-width="2"/>
              <rect x="18" y="5" width="10" height="5" fill="#85FBFF"/>
            </svg>
          </div>
        </div>
        
        <div class="ship-wrapper">
          <div class="ship-container" data-size="2" data-id="ship-2-3">
            <svg class="ship-icon ship-2" viewBox="0 0 60 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M0 20 L8 10 L52 10 L60 20 L52 30 L8 30 Z" fill="#85FBFF" stroke="#85FBFF" stroke-width="2"/>
              <rect x="18" y="5" width="10" height="5" fill="#85FBFF"/>
            </svg>
          </div>
        </div>
        
        <div class="ship-wrapper">
          <div class="ship-container" data-size="1" data-id="ship-1-1">
            <svg class="ship-icon ship-1" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="20" cy="20" r="15" fill="#85FBFF" stroke="#85FBFF" stroke-width="2"/>
              <rect x="18" y="12" width="4" height="8" fill="#101426"/>
            </svg>
          </div>
        </div>
        
        <div class="ship-wrapper">
          <div class="ship-container" data-size="1" data-id="ship-1-2">
            <svg class="ship-icon ship-1" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="20" cy="20" r="15" fill="#85FBFF" stroke="#85FBFF" stroke-width="2"/>
              <rect x="18" y="12" width="4" height="8" fill="#101426"/>
            </svg>
          </div>
        </div>
        
        <div class="ship-wrapper">
          <div class="ship-container" data-size="1" data-id="ship-1-3">
            <svg class="ship-icon ship-1" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="20" cy="20" r="15" fill="#85FBFF" stroke="#85FBFF" stroke-width="2"/>
              <rect x="18" y="12" width="4" height="8" fill="#101426"/>
            </svg>
          </div>
        </div>
        
        <div class="ship-wrapper">
          <div class="ship-container" data-size="1" data-id="ship-1-4">
            <svg class="ship-icon ship-1" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="20" cy="20" r="15" fill="#85FBFF" stroke="#85FBFF" stroke-width="2"/>
              <rect x="18" y="12" width="4" height="8" fill="#101426"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Кнопки управления -->
    <div class="controls-row">
      <button class="btn-control" id="rotate-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-3-6.7"/><path d="M21 3v6h-6"/></svg>
        Повернуть
      </button>
      
      <!-- выпадающий список -->
      <div class="dropdown-wrapper">
        <button class="btn-control dropdown-toggle" id="dropdown-toggle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          Расстановка
        </button>
        <div class="dropdown-menu" id="dropdown-menu">
          <div class="dropdown-item" data-strategy="diagonal">Кластерная</div>
          <div class="dropdown-item" data-strategy="edges">Краевая</div>
          <div class="dropdown-item" data-strategy="random">Случайная</div>
        </div>
      </div>
      
      <button class="btn-control" id="clear-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        Очистить
      </button>
    </div>

    <!-- Навигация -->
    <div class="bottom-nav">
      <button class="btn-nav" id="back-btn">Назад</button>
      <button class="btn-nav" id="start-btn">Начать игру</button>
    </div>
  </div>
  
    <script src="js/audio.js"></script>
  <script src="/js/ship-placement.js"></script>
</body>
</html>
