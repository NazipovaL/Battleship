<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Морской Бой - Подключение</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    @font-face {
      font-family: 'GULAG Pavljenko';
      src: url('../assets/fonts/GULAG-Pavljenko.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }
  </style>
  
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="background-blur"></div>
  
  <div class="container join-game-container">
    <!-- Логотип -->
    <div class="logo">
      <img src="/assets/images/logo.png" alt="Мечи" class="swords-icon">
    </div>
    
    <h1 class="main-title join-game-title">ПОДКЛЮЧЕНИЕ К ИГРЕ</h1>
    
    <p class="code-label">Введите код подключения</p>
    <input type="text" class="code-input" id="game-code-input" placeholder="AAAA-0000" maxlength="9">
    
    <button class="btn-submit" id="join-btn">Ввод</button>
    <button class="btn-back" id="back-btn">Назад</button>
  </div>
  
    <script src="js/audio.js"></script>
  <script src="/js/join-game.js"></script>
</body>
</html>
